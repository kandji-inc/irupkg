# irupkg scheduled runner
# Copy .env.example --> .env and fill in your credentials before running.
#
# Usage:
#   docker compose up -d          # start the scheduler (reads brew_cron.json for casks + interval)
#   docker compose logs -f        # tail logs
#   docker compose down           # stop

services:
  irupkg-scheduler:
    build: .
    entrypoint: ["/irupkg/scheduler.sh"]
    environment:
      IRU_API_URL: ${IRU_API_URL:-}
      KANDJI_API_URL: ${KANDJI_API_URL:-}
      IRUPKG_TOKEN: ${IRUPKG_TOKEN:-}
      KANDJI_TOKEN: ${KANDJI_TOKEN:-}
      SLACK_TOKEN: ${SLACK_TOKEN:-}
    volumes:
      - ./brew_cron.json:/home/irupkg/.local/share/irupkg/brew_cron.json:ro
    restart: unless-stopped
